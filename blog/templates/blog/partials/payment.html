<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Payment</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#eef2ff,#f8fafc);
            min-height:100vh;
        }

        .payment-card{
            max-width:900px;
            margin:60px auto;
            background:#fff;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08);
            overflow:hidden;
        }

        .left-panel{
            background:#111827;
            color:#fff;
            padding:40px;
        }

        .right-panel{
            padding:40px;
        }

        .summary-box{
            background:#f8fafc;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
        }

        .btn-pay{
            width:100%;
            padding:12px;
            background:#22c55e;
            border:none;
            color:#fff;
            font-weight:700;
            border-radius:12px;
            transition:0.3s;
        }

        .btn-pay:hover{
            background:#16a34a;
            transform:translateY(-2px);
        }

        .btn-cancel{
            width:100%;
            padding:12px;
            border-radius:12px;
            font-weight:700;
        }

        .icon{
            font-size:40px;
            margin-bottom:15px;
        }

    </style>

</head>

<body>

<div class="payment-card">

    <div class="row m-0">

        <!-- ================= LEFT INFO ================= -->

        <div class="col-md-5 left-panel">

            <div class="icon">💳</div>

            <h3 style="font-weight:800;">Secure Payment</h3>

            <p style="color:#d1d5db;">
                Your transaction is protected with SSL encryption.
            </p>

            <hr style="background:#374151;">

            <p style="font-size:14px; color:#9ca3af;">
                ✔ Fast checkout<br>
                ✔ Secure payment<br>
                ✔ Instant confirmation
            </p>

        </div>

        <!-- ================= RIGHT ACTION ================= -->

        <div class="col-md-7 right-panel">

            <h4 style="font-weight:800;">Order Summary</h4>

            <div class="summary-box">

                <p class="mb-1">Items in your cart</p>
                <h5 style="font-weight:800;">
                    Total Amount
                </h5>

                <!-- Agar tum chaho to yahan dynamic total bhi show kar sakte ho -->

            </div>

            <!-- Buttons -->

            <a href="{% url 'blog:payment_success' %}">

                <button class="btn-pay mb-3">
                    Pay Now
                </button>

            </a>

            <a href="{% url 'blog:cart' %}">

                <button class="btn btn-outline-danger btn-cancel">
                    Cancel Payment
                </button>

            </a>

            <p style="margin-top:20px; font-size:12px; color:#6b7280; text-align:center;">
                By proceeding you agree to our terms & conditions
            </p>

        </div>

    </div>

</div>

</body>
</html>
