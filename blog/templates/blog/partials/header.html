<!-- ================= HERO SECTION START ================= -->

<header
        style="
            background:
            linear-gradient(rgba(17,24,39,0.75), rgba(17,24,39,0.75)),
            url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2070&auto=format&fit=crop');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            min-height:600px;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        ">

    <div class="container px-4 px-lg-5">

        <div class="text-center text-white">

            <!-- SMALL TEXT -->

            <p style="
                    letter-spacing:3px;
                    font-size:14px;
                    font-weight:500;
                    margin-bottom:15px;
                    color:#d1d5db;
                    text-transform:uppercase;
               ">

                Welcome To SparkShop

            </p>

            <!-- HEADING -->

            <h1 style="
                    font-size:70px;
                    font-weight:800;
                    margin-bottom:20px;
                    line-height:1.1;
                    text-shadow:0 4px 20px rgba(0,0,0,0.3);
               ">

                Discover Your
                <span style="color:#3b82f6;">
                    Fashion
                </span>

            </h1>

            <!-- DESCRIPTION -->

            <p style="
                    font-size:18px;
                    color:#e5e7eb;
                    max-width:700px;
                    margin:auto;
                    margin-bottom:40px;
                    line-height:1.8;
               ">

                Explore premium fashion collections, trendy outfits,
                stylish accessories, and everything you need
                to elevate your style.

            </p>

            <!-- SEARCH BOX -->

            <div style="
                    display:flex;
                    justify-content:center;
                    align-items:center;
                 ">

                <form method="get"
                      action="{% url 'blog:search' %}"

                      style="
                            width:100%;
                            max-width:650px;
                            position:relative;
                      ">

                    <input
                            type="search"
                            name="query"
                            value="{{ request.GET.query }}"
                            placeholder="Search products, brands, categories..."

                            style="
                                width:100%;
                                height:65px;
                                border:none;
                                outline:none;
                                border-radius:60px;
                                padding:0 180px 0 28px;
                                font-size:17px;
                                background:#ffffff;
                                box-shadow:0 10px 30px rgba(0,0,0,0.15);
                            ">

                    <!-- SEARCH BUTTON -->

                    <button
                            type="submit"

                            style="
                                position:absolute;
                                right:8px;
                                top:8px;
                                height:49px;
                                padding:0 30px;
                                border:none;
                                border-radius:50px;
                                background:#2563eb;
                                color:#fff;
                                font-weight:600;
                                font-size:15px;
                                transition:0.3s;
                            "

                            onmouseover="
                                this.style.background='#1d4ed8';
                                this.style.transform='scale(1.03)';
                            "

                            onmouseout="
                                this.style.background='#2563eb';
                                this.style.transform='scale(1)';
                            ">

                        <i class="fas fa-search me-2"></i>
                        Search

                    </button>

                </form>

            </div>

        </div>

    </div>

</header>

<!-- ================= HERO SECTION END ================= -->
